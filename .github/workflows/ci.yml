name: CI

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: ["*"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [nightly, stable, "1.88"]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.rust == 'nightly' }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        env:
          cache-name: ci
        with:
          shared-key: ${{ matrix.os }}-${{ env.cache-name }}-${{ matrix.rust }}

      - name: MacOS Workaround
        if: matrix.os == 'macos-latest'
        run: cargo clean -p serde_derive -p thiserror

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      - name: Override rust toolchain
        run: rustup override set ${{ matrix.rust }}

      - name: Rustup Show
        run: rustup show

      - uses: taiki-e/install-action@nextest

      - name: Build Debug
        run: |
          cargo build

      # gpgsm: needed by the x509 signing e2e test (unix-only)
      - name: Install commit-signing tools (linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y gpgsm

      - name: Install commit-signing tools (macos)
        if: matrix.os == 'macos-latest'
        run: brew install gnupg

      - name: Run tests
        run: make test

      - name: Run clippy
        run: |
          make clippy

      - name: Build Release
        run: make build-release

      - name: Test Install
        run: cargo install --path "." --force --locked

      - name: Binary Size (unix)
        if: matrix.os != 'windows-latest'
        run: |
          ls -l ./target/release/rusted-git

      - name: Binary Size (win)
        if: matrix.os == 'windows-latest'
        run: |
          ls -l ./target/release/rusted-git.exe

      - name: Binary dependencies (mac)
        if: matrix.os == 'macos-latest'
        run: |
          otool -L ./target/release/rusted-git

      - name: Build MSI (windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo install cargo-wix --version 0.3.3 --locked
          cargo wix --version
          cargo wix -p rusted-git --no-build --nocapture --output ./target/wix/rusted-git-win.msi
          ls -l ./target/wix/rusted-git-win.msi

  build-linux-musl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [nightly, stable, "1.88"]
    continue-on-error: ${{ matrix.rust == 'nightly' }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        env:
          cache-name: ci
        with:
          key: ubuntu-latest-${{ env.cache-name }}-${{ matrix.rust }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: x86_64-unknown-linux-musl

      # The build would fail without manually installing the target.
      # https://github.com/dtolnay/rust-toolchain/issues/83
      - name: Manually install target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Override rust toolchain
        run: rustup override set ${{ matrix.rust }}

      - name: Rustup Show
        run: rustup show

      - uses: taiki-e/install-action@nextest

      - name: Setup MUSL
        run: |
          sudo apt-get -qq install musl-tools
      # gpgsm: needed by the x509 signing e2e test
      - name: Install commit-signing tools
        run: sudo apt-get -qq install gpgsm
      - name: Build Debug
        run: |
          make build-linux-musl-debug
          ./target/x86_64-unknown-linux-musl/debug/rusted-git --version
      - name: Build Release
        run: |
          make build-linux-musl-release
          ./target/x86_64-unknown-linux-musl/release/rusted-git --version
          ls -l ./target/x86_64-unknown-linux-musl/release/rusted-git
      - name: Test
        run: |
          make test-linux-musl
      - name: Test Install
        run: cargo install --path "." --force --locked

  build-linux-arm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [nightly, stable, "1.88"]
    continue-on-error: ${{ matrix.rust == 'nightly' }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        env:
          cache-name: ci
        with:
          key: ubuntu-latest-${{ env.cache-name }}-${{ matrix.rust }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Override rust toolchain
        run: rustup override set ${{ matrix.rust }}

      - uses: taiki-e/install-action@nextest

      # qemu runs the cross-compiled aarch64 test binaries; the aarch64 cross
      # runtime provides the sysroot qemu loads guest libs from; gpgsm is needed
      # by the x509 signing e2e test (ssh-keygen/gpg/openssl are preinstalled).
      - name: Install emulation and signing tools
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static libc6-arm64-cross libgcc-s1-arm64-cross gpgsm

      - name: Setup ARM toolchain
        run: |
          rustup target add aarch64-unknown-linux-gnu
          rustup target add armv7-unknown-linux-gnueabihf
          rustup target add arm-unknown-linux-gnueabihf

          curl -o $GITHUB_WORKSPACE/aarch64.tar.xz https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu-a/8.2-2018.08/gcc-arm-8.2-2018.08-x86_64-aarch64-linux-gnu.tar.xz
          curl -o $GITHUB_WORKSPACE/arm.tar.xz https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu-a/8.2-2018.08/gcc-arm-8.2-2018.08-x86_64-arm-linux-gnueabihf.tar.xz

          tar xf $GITHUB_WORKSPACE/aarch64.tar.xz
          tar xf $GITHUB_WORKSPACE/arm.tar.xz

          echo "$GITHUB_WORKSPACE/gcc-arm-8.2-2018.08-x86_64-aarch64-linux-gnu/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/gcc-arm-8.2-2018.08-x86_64-arm-linux-gnueabihf/bin" >> $GITHUB_PATH

      - name: Rustup Show
        run: rustup show

      - name: Build Debug
        run: |
          make build-linux-arm-debug

      # Run the suite for aarch64 under emulation. qemu emulates the aarch64
      # test binary (loading its libs from the cross sysroot via -L) while
      # passing native x86 child processes (git, gpg, ssh-keygen, ...) straight
      # through to the host, so the signing e2e tests exercise the real tools.
      - name: Run tests (aarch64, emulated)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER: qemu-aarch64-static -L /usr/aarch64-linux-gnu
        run: make test-linux-arm

      - name: Build Release
        run: |
          make build-linux-arm-release
          ls -l ./target/aarch64-unknown-linux-gnu/release/rusted-git || ls -l ./target/armv7-unknown-linux-gnueabihf/release/rusted-git || ls -l ./target/arm-unknown-linux-gnueabihf/release/rusted-git

  build-apple-x86:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [nightly, stable, "1.88"]
    continue-on-error: ${{ matrix.rust == 'nightly' }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        env:
          cache-name: ci
        with:
          key: apple-x86-${{ env.cache-name }}-${{ matrix.rust }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Override rust toolchain
        run: rustup override set ${{ matrix.rust }}

      - name: Setup target
        run: rustup target add x86_64-apple-darwin

      - name: Rustup Show
        run: rustup show

      - name: Build Debug
        run: |
          make build-apple-x86-debug
      - name: Build Release
        run: |
          make build-apple-x86-release
          ls -l ./target/x86_64-apple-darwin/release/rusted-git

  linting:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        env:
          cache-name: ci
        with:
          key: ubuntu-latest-${{ env.cache-name }}-stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt -- --check

      - name: tombi install
        uses: tombi-toml/setup-tombi@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: '0.9.0'
      
      - name: tombi check
        run: |
          tombi format --check

      - name: cargo-deny install
        run: |
          cargo install --locked cargo-deny

      - name: cargo-deny checks
        run: |
          cargo deny check

  udeps:
    name: udeps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        env:
          cache-name: ci
        with:
          key: ubuntu-latest-${{ env.cache-name }}-nightly

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: build cargo-udeps
        run: cargo install --git https://github.com/est31/cargo-udeps --locked

      - name: run cargo-udeps
        run: cargo +nightly udeps --all-targets

  log-test:
    name: Changelog Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes
        id: extract_release_notes
        uses: ffurrer2/extract-release-notes@v2
        with:
          release_notes_file: ./release-notes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes.txt
          path: ./release-notes.txt

  test-homebrew:
    name: Test Homebrew Formula (macOS)
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install stable Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Let Homebrew build rusted-git from source
        run: brew install --build-from-source rusted-git
